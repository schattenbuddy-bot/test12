<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Button Seite</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        #container {
            text-align: center;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #ff4444;
            color: white;
        }

        #text {
            margin-top: 20px;
            font-size: 30px;
            display: none;
        }
    </style>
</head>
<body>

<div id="container">
    <button onclick="showText()">Klick mich</button>
    <div id="text">fick dich</div>
</div>

<script>
    function showText() {
        document.getElementById("text").style.display = "block";
    }
</script>

</body>
</html>
